    <div class="container">
    <h1>ToDo List</h1>

    <div class="item">
        <input type="text" id="taskInput" placeholder="Enter your Task">
        <button id="addBtn">Add</button>
    </div>

    <div id="todoList">
        <div class="todo-item">
            <span>Task1</span>
            <span class="minus">-</span>
        </div>

        <div class="todo-item">
            <span>Task2</span>
            <span class="plus">+</span>
        </div>

        <div class="todo-item">
            <span>Task3</span>
            <span class="plus">+</span>
        </div>

        
    </div>
</div>
