<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="style.css">
    
</head>
<body>
    <div class="container">
        <h1>ToDo List</h1>
        <div class="item">           
                          
                <input type="text " placeholder="Enter your Task" >
                <button >Add</button> 
        </div>
        <div class="todo-item">
            <span>Task1</span>
            <span class="minus">-</span>

        </div>
         <div class="todo-item">
            <span>Task2</span>
            <span class="plus">+</span>
        </div>
         <div class="todo-item">
            <span>Task3</span>
            <span class="plus">+</span>
        </div>
         <div class="todo-item">
            <span>Task4</span>
            <span class="plus">+</span>
        </div>
    </div>
</body>
</html>
